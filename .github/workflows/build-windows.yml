# Builds the Windows desktop installer on a machine that already has the C++ toolchain,
# so no end user ever needs one. Produces Tally-Bridge-Setup-<version>.exe.
#
# Run it two ways:
#   - Manually: Actions tab -> "Build Windows installer" -> Run workflow.
#   - On a version tag: `git tag v0.1.0 && git push --tags` also attaches the .exe to a Release.
#
# windows-latest ships Visual Studio Build Tools + Python, which is exactly what better-sqlite3
# needs to compile for Electron's ABI — the step that fails on a bare user PC.
name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs every workspace and runs the root `prepare`, which builds the shared packages.
      - name: Install
        run: npm ci

      # The Electron app's own compile step (dist/main/index.js + the renderer bundle).
      - name: Build the app
        run: npm run build -w @tally-bridge/bridge

      # Rebuild better-sqlite3 against Electron's ABI. windows-latest ships the C++ toolchain, so
      # this compile (which fails on a bare user PC) succeeds here. We do it OURSELVES rather than
      # let electron-builder do it, because electron-builder's own rebuild runs `npm install
      # --omit=dev` in the flat workspace, which prunes its OWN helper binaries and then fails.
      - name: Rebuild native module for Electron
        working-directory: apps/bridge
        run: npm run dev:rebuild-native -- --yes

      # electron-builder now only PACKAGES (npmRebuild:false) — it copies the Electron-ABI
      # better-sqlite3 we just built into the NSIS installer, touching node_modules not at all.
      # Unsigned, so SmartScreen warns on first run until an OV certificate is added.
      - name: Package installer
        working-directory: apps/bridge
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tally-bridge-windows-installer
          path: apps/bridge/release/*.exe
          if-no-files-found: error

      # Only when triggered by a tag: attach the installer to a GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/bridge/release/*.exe
