# Builds the Windows desktop installer on a machine that already has the C++ toolchain,
# so no end user ever needs one. Produces Tally-Bridge-Setup-<version>.exe.
#
# Run it two ways:
#   - Manually: Actions tab -> "Build Windows installer" -> Run workflow.
#   - On a version tag: `git tag v0.1.0 && git push --tags` also attaches the .exe to a Release.
#
# windows-latest ships Visual Studio Build Tools + Python, which is exactly what better-sqlite3
# needs to compile for Electron's ABI — the step that fails on a bare user PC.
name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# The release step (softprops/action-gh-release) needs to write a Release; the default token is
# read-only unless this is granted. Without it, a tag build packages fine but fails to publish.
permissions:
  contents: write

jobs:
  build:
    # windows-2022, NOT windows-latest: the latest image ships Visual Studio 18 (a 2026 preview)
    # that node-gyp cannot yet identify ("unknown version undefined"), so the native compile
    # fails to find a compiler. windows-2022's Visual Studio 2022 is recognised by every node-gyp.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installs every workspace and runs the root `prepare`, which builds the shared packages.
      - name: Install
        run: npm ci

      # The Electron app's own compile step (dist/main/index.js + the renderer bundle).
      - name: Build the app
        run: npm run build -w @tally-bridge/bridge

      # The deployable dashboard bundle the cloud-setup uploads to Vercel. It is gitignored, so it
      # MUST be generated here — without it the packaged app has no dashboard files to deploy and
      # cloud setup fails with "missing its dashboard files".
      - name: Build the deploy bundle
        run: npm run build:deploy-bundle

      # Give better-sqlite3 an Electron-ABI binary. Done DIRECTLY in its own folder — first try a
      # published Electron prebuild, then compile from source (windows-latest has the C++
      # toolchain) — rather than via `npm rebuild`, which npm's install-script gate blocks, and
      # rather than via electron-builder, whose own rebuild prunes the flat workspace's shared
      # node_modules and self-destructs. ELECTRON_VER is the single source of truth for the ABI.
      - name: Rebuild better-sqlite3 for Electron
        shell: pwsh
        working-directory: node_modules/better-sqlite3
        env:
          ELECTRON_VER: 43.1.1
        run: |
          npx --yes prebuild-install -r electron -t $env:ELECTRON_VER --dist-url=https://electronjs.org/headers
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No prebuild for Electron $env:ELECTRON_VER — compiling from source."
            # node-gyp@latest explicitly: the copy bundled here is 9.4.1, whose gyp imports
            # distutils (gone in Python 3.12) and cannot identify recent Visual Studio. `npx
            # node-gyp` would pick that stale local copy, so the version is pinned here.
            npx --yes node-gyp@latest rebuild --release --runtime=electron --target=$env:ELECTRON_VER --dist-url=https://electronjs.org/headers
          }
          if ($LASTEXITCODE -ne 0) { exit 1 }

      # Replace the @tally-bridge/* workspace symlinks with real copies. They point to
      # ../packages/* — a sibling OUTSIDE apps/bridge — and electron-builder's asar packer refuses
      # to follow a link out of the app tree ("must be under apps/bridge"). `rmdir` (no /s) removes
      # only the junction/symlink, never the target's contents.
      - name: Replace workspace symlinks with real copies
        shell: pwsh
        run: |
          foreach ($p in 'core','crypto','protocol','tally','viewmodel','sync') {
            $dest = "node_modules/@tally-bridge/$p"
            if (Test-Path $dest) { cmd /c "rmdir `"$dest`"" }
            Copy-Item "packages/$p" $dest -Recurse -Force
          }

      # electron-builder now only PACKAGES (npmRebuild:false) — it copies the Electron-ABI
      # better-sqlite3 we just built into the NSIS installer, touching node_modules not at all.
      # Unsigned, so SmartScreen warns on first run until an OV certificate is added.
      - name: Package installer
        working-directory: apps/bridge
        run: npx electron-builder --win --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: tally-bridge-windows-installer
          path: apps/bridge/release/*.exe
          if-no-files-found: error

      # Only when triggered by a tag: attach the installer to a GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/bridge/release/*.exe
