<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      CSP is also injected as a response header by the main process (see window.ts). This meta
      tag is belt-and-braces: it applies before the first byte of script runs, and it survives
      if someone ever loads this file through a path that misses the header hook.

      No 'unsafe-inline'. No remote origins. connect-src 'none' — the renderer never touches the
      network; every fetch happens in the main process.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'none'; form-action 'none'; base-uri 'none'; object-src 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tally Bridge</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./wizard.css" />
  </head>
  <body>
    <div id="root">
      <!-- Replaced on first paint. Present so a slow machine shows something immediate rather
           than a white flash, which is what makes desktop apps feel cheap. -->
      <div class="boot">Starting Tally Bridge…</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
